{% load static %}
{% load lb_tags %}
{% labb_theme as labb_theme_attr %}
<!DOCTYPE html>
<html lang="en" {{ labb_theme_attr|safe }}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ description|default:'NeuralDev provides mobile development, web development, AI-assisted development, and computer or laptop repair services.' }}">
    <title>{{ title|default:'NeuralDev' }} | Technology Professional</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="{% static 'portfolio/img/favicon/favicon.svg' %}">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'portfolio/img/favicon/favicon-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'portfolio/img/favicon/favicon-512x512.png' %}">
    <link rel="apple-touch-icon" href="{% static 'portfolio/img/favicon/apple-touch-icon.png' %}">
    
    <!-- HTMX for AJAX -->
    <script src="https://unpkg.com/htmx.org@2.0.0" defer></script>
    
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <c-lb.m.dependencies noGlobalCSS setThemeEndpoint="{% url 'portfolio:set_theme' %}" alpine />
</head>
<body class="min-h-screen bg-base-100 text-base-content grainy-bg antialiased">
    {% csrf_token %}
    
    <!-- Navigation -->
    <c-navbar />
    
    <!-- Main Content -->
    <main>
        {{ slot }}
    </main>
    
    <!-- Footer -->
    <c-footer />
    
    <!-- Theme Switcher Script -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const themeInputs = document.querySelectorAll('input[name="theme-dropdown"].theme-controller');
        
        function updateActiveState() {
            themeInputs.forEach(function(input) {
                if (input.checked) {
                    input.classList.add('btn-active');
                } else {
                    input.classList.remove('btn-active');
                }
            });
        }
        
        updateActiveState();
        
        themeInputs.forEach(function(input) {
            input.addEventListener('change', function() {
                themeInputs.forEach(function(btn) {
                    btn.classList.remove('btn-active');
                });
                this.classList.add('btn-active');
            });
        });
    });
    </script>
</body>
</html>
