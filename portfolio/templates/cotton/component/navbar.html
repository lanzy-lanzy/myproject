{% load lb_tags %}
{% load static %}

{% labb_theme_val as theme %}

<!-- Navbar Component -->
<nav 
    class="sticky top-0 z-50 bg-base-100/90 border-b border-base-content/5"
    x-data="{ mobileMenuOpen: false }"
>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 md:h-20">
            <!-- Logo -->
            <a href="{% url 'portfolio:home' %}" class="flex items-center gap-2 group">
                <img src="{% static 'portfolio/img/neuraldev_logo.svg' %}" alt="Nightly Dev" class="brand-logo brand-logo-nav transition-transform group-hover:-translate-y-0.5">
            </a>
            
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center gap-1">
                <a href="#home" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">Home</a>
                <a href="#about" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">About</a>
                <a href="#skills" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">Skills</a>
                <a href="#projects" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">Projects</a>
                <a href="#experience" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">Experience</a>
                <a href="#services" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">Services</a>
                <a href="{% url 'portfolio:contact' %}" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">Contact</a>
            </div>
            
            <!-- Right Actions -->
            <div class="flex items-center gap-2">
                <!-- Theme Switcher -->
                <c-lb.dropdown placement="bottom" alignment="end">
                    <c-lb.dropdown.trigger class="btn btn-sm btn-circle btn-ghost bg-base-100 border border-base-content/10 hover:border-base-content/20 shadow-sm">
                        <c-lbi.rmx.palette w="1.125rem" h="1.125rem" class="text-base-content/70" />
                    </c-lb.dropdown.trigger>
                    <c-lb.dropdown.content class="bg-base-100 rounded-xl w-48 shadow-lg border border-base-content/10 mt-2">
                        <c-lb.menu class="w-full p-2">
                            {% for key, value in themeOptions.items %}
                                <input
                                    type="radio"
                                    name="theme-dropdown"
                                    value="{{key}}"
                                    class="theme-controller btn btn-ghost btn-sm justify-start rounded-lg text-sm font-normal"
                                    aria-label="{{value}}"
                                    {% if key == theme %}checked{% endif %}
                                />
                            {% endfor %}
                        </c-lb.menu>
                    </c-lb.dropdown.content>
                </c-lb.dropdown>
                
                <!-- Mobile Menu Button -->
                <button 
                    class="md:hidden btn btn-sm btn-circle btn-ghost"
                    @click="mobileMenuOpen = !mobileMenuOpen"
                    aria-label="Toggle menu"
                >
                    <c-lbi.rmx.list x-show="!mobileMenuOpen" w="1.5rem" h="1.5rem" />
                    <c-lbi.rmx.close x-cloak x-show="mobileMenuOpen" w="1.5rem" h="1.5rem" />
                </button>
            </div>
        </div>
    </div>
    
    <!-- Mobile Menu -->
    <div 
        x-cloak
        x-show="mobileMenuOpen"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 -translate-y-2"
        class="md:hidden border-t border-base-content/5 bg-base-100"
    >
        <div class="px-4 py-4 space-y-1">
            <a href="#home" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Home</a>
            <a href="#about" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">About</a>
            <a href="#skills" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Skills</a>
            <a href="#projects" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Projects</a>
            <a href="#experience" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Experience</a>
            <a href="#services" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Services</a>
            <a href="{% url 'portfolio:contact' %}" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Contact</a>
        </div>
    </div>
</nav>

<!-- Theme Options (for dropdown) -->
<c-vars
    :themeOptions="{
        '__system__': 'System',
        'labb-light': 'Light',
        'labb-dark': 'Dark',
        'light': 'Daisy Light',
        'dark': 'Daisy Dark'
    }"
/>
