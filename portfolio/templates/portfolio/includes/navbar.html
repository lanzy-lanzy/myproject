{% load static %}

<!-- Navbar -->
<nav
    class="nav-glass sticky top-0 z-50 backdrop-blur-xl"
    x-data="{ mobileMenuOpen: false }"
>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 md:h-20">
            <!-- Logo -->
            <a href="{% url 'portfolio:home' %}" class="flex items-center gap-2 group">
                <img src="{% static 'portfolio/img/neuraldev_logo.svg' %}" alt="Nightly Dev" class="brand-logo brand-logo-nav transition-transform group-hover:-translate-y-0.5">
            </a>
            
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center gap-1">
                <a href="{% url 'portfolio:home' %}#home" class="btn btn-ghost btn-sm text-base-content/70 hover:text-primary">Home</a>
                <a href="{% url 'portfolio:home' %}#about" class="btn btn-ghost btn-sm text-base-content/70 hover:text-primary">About</a>
                <a href="{% url 'portfolio:home' %}#skills" class="btn btn-ghost btn-sm text-base-content/70 hover:text-primary">Skills</a>
                <a href="{% url 'portfolio:home' %}#projects" class="btn btn-ghost btn-sm text-base-content/70 hover:text-primary">Projects</a>
                <a href="{% url 'portfolio:home' %}#experience" class="btn btn-ghost btn-sm text-base-content/70 hover:text-primary">Experience</a>
                <a href="{% url 'portfolio:home' %}#services" class="btn btn-ghost btn-sm text-base-content/70 hover:text-primary">Services</a>
                <a href="{% url 'portfolio:contact' %}" class="btn btn-ghost btn-sm text-base-content/70 hover:text-base-content">Contact</a>
            </div>
            
            <!-- Right Actions -->
            <div class="flex items-center gap-2">
                <!-- Theme Switcher -->
                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-sm btn-circle btn-ghost bg-base-100/70 border border-base-content/10 hover:border-primary/40 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-base-content/70"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
                    </div>
                    <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow-lg bg-base-100 rounded-xl w-48 border border-base-content/10 mt-2">
                        <li><a class="rounded-lg {% if theme == '__system__' %}active{% endif %}" data-theme-choice="">System</a></li>
                        <li><a class="rounded-lg {% if theme == 'cyber-signal' %}active{% endif %}" data-theme-choice="cyber-signal">Cyber Signal</a></li>
                        <li><a class="rounded-lg {% if theme == 'labb-light' %}active{% endif %}" data-theme-choice="labb-light">Light</a></li>
                        <li><a class="rounded-lg {% if theme == 'labb-dark' %}active{% endif %}" data-theme-choice="labb-dark">Dark</a></li>
                        <li><a class="rounded-lg {% if theme == 'light' %}active{% endif %}" data-theme-choice="light">Daisy Light</a></li>
                        <li><a class="rounded-lg {% if theme == 'dark' %}active{% endif %}" data-theme-choice="dark">Daisy Dark</a></li>
                    </ul>
                </div>
                
                <!-- Mobile Menu Button -->
                <button 
                    class="md:hidden btn btn-sm btn-circle btn-ghost"
                    @click="mobileMenuOpen = !mobileMenuOpen"
                    aria-label="Toggle menu"
                >
                    <svg x-show="!mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
                    <svg x-cloak x-show="mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Mobile Menu -->
    <div 
        x-cloak
        x-show="mobileMenuOpen"
        x-transition
        class="md:hidden border-t border-base-content/10 bg-base-100/95 backdrop-blur-xl"
    >
        <div class="px-4 py-4 space-y-1">
            <a href="{% url 'portfolio:home' %}#home" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Home</a>
            <a href="{% url 'portfolio:home' %}#about" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">About</a>
            <a href="{% url 'portfolio:home' %}#skills" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Skills</a>
            <a href="{% url 'portfolio:home' %}#projects" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Projects</a>
            <a href="{% url 'portfolio:home' %}#experience" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Experience</a>
            <a href="{% url 'portfolio:home' %}#services" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Services</a>
            <a href="{% url 'portfolio:contact' %}" @click="mobileMenuOpen = false" class="block btn btn-ghost justify-start">Contact</a>
        </div>
    </div>
</nav>
