<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 16 445 118" width="100%" height="100%">
  <defs>
    <!-- Modern Tech Gradients -->
    <linearGradient id="ai-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#0077FF" />
      <stop offset="100%" stop-color="#B400FF" />
    </linearGradient>

    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#B400FF" />
    </linearGradient>

    <!-- Glassmorphism Effects -->
    <linearGradient id="glass-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <linearGradient id="glass-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1" />
    </linearGradient>

    <filter id="dot-glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25  0 0 0 0 0.92  0 0 0 0 1  0 0 0 0.8 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="text-glow" x="-18%" y="-80%" width="136%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16  0 0 0 0 0.82  0 0 0 0 1  0 0 0 0.46 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .logo-symbol circle {
        filter: url(#dot-glow);
        transform-box: fill-box;
        transform-origin: center;
        animation: dot-pulse 2.8s ease-in-out infinite;
      }

      .logo-symbol circle:nth-of-type(3n + 1) {
        animation-delay: -0.55s;
      }

      .logo-symbol circle:nth-of-type(3n + 2) {
        animation-delay: -1.1s;
      }

      .logo-symbol line,
      .logo-symbol polygon,
      .logo-symbol path {
        animation: circuit-glow 3.6s ease-in-out infinite;
      }

      .logo-wordmark text {
        filter: url(#text-glow);
        animation: wordmark-glow 4.2s ease-in-out infinite;
      }

      .logo-wordmark tspan {
        animation: dev-glow 3.2s ease-in-out infinite;
      }

      @keyframes dot-pulse {
        0%, 100% {
          opacity: 0.78;
          transform: scale(0.92);
        }
        50% {
          opacity: 1;
          transform: scale(1.18);
        }
      }

      @keyframes circuit-glow {
        0%, 100% {
          opacity: 0.68;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes wordmark-glow {
        0%, 100% {
          opacity: 0.92;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes dev-glow {
        0%, 100% {
          opacity: 0.78;
        }
        50% {
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .logo-symbol circle,
        .logo-symbol line,
        .logo-symbol polygon,
        .logo-symbol path,
        .logo-wordmark text,
        .logo-wordmark tspan {
          animation: none;
        }
      }
    </style>
  </defs>

  <g class="logo-symbol" transform="translate(25, 20)">
    <!-- Decorative Ambient Particles -->
    <circle cx="0" cy="15" r="1.5" fill="#00E5FF" opacity="0.6"/>
    <circle cx="110" cy="10" r="2" fill="#B400FF" opacity="0.8"/>
    <circle cx="105" cy="100" r="1.5" fill="#0077FF" opacity="0.5"/>
    <circle cx="-5" cy="85" r="1" fill="#FFFFFF" opacity="0.4"/>

    <!-- Outer Glass Hexagon (Base Panel) -->
    <polygon points="55,5 98.301,30 98.301,80 55,105 11.699,80 11.699,30" fill="url(#glass-fill)" stroke="url(#glass-stroke)" stroke-width="1.5" />
    
    <!-- Inner Neural Network (Hypercube structure) -->
    <polygon points="55,30 76.651,42.5 76.651,67.5 55,80 33.349,67.5 33.349,42.5" fill="none" stroke="url(#ai-gradient)" stroke-width="1.5" />
    
    <!-- Inner radiating connections -->
    <line x1="55" y1="30" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="76.651" y1="42.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="76.651" y1="67.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="55" y1="80" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="33.349" y1="67.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="33.349" y1="42.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />

    <!-- Outer radiating connections -->
    <line x1="55" y1="5" x2="55" y2="30" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="98.301" y1="30" x2="76.651" y2="42.5" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="98.301" y1="80" x2="76.651" y2="67.5" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="55" y1="105" x2="55" y2="80" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="11.699" y1="80" x2="33.349" y2="67.5" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="11.699" y1="30" x2="33.349" y2="42.5" stroke="url(#ai-gradient)" stroke-width="1.5" />

    <!-- Stylized 'N' Highlight Path -->
    <path d="M 11.699 80 L 11.699 30 L 55 55 L 98.301 80 L 98.301 30" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Network Nodes (Data Points) -->
    <!-- Center Core Node -->
    <circle cx="55" cy="55" r="5" fill="#FFFFFF" />
    
    <!-- Inner Nodes -->
    <circle cx="55" cy="30" r="3.5" fill="#00E5FF" />
    <circle cx="76.651" cy="42.5" r="3.5" fill="#0077FF" />
    <circle cx="76.651" cy="67.5" r="3.5" fill="#B400FF" />
    <circle cx="55" cy="80" r="3.5" fill="#B400FF" />
    <circle cx="33.349" cy="67.5" r="3.5" fill="#0077FF" />
    <circle cx="33.349" cy="42.5" r="3.5" fill="#00E5FF" />
    
    <!-- Outer Nodes / Path Vertices -->
    <circle cx="55" cy="5" r="3" fill="#00E5FF" />
    <circle cx="98.301" cy="30" r="4.5" fill="#FFFFFF" />
    <circle cx="98.301" cy="80" r="4.5" fill="#FFFFFF" />
    <circle cx="55" cy="105" r="3" fill="#B400FF" />
    <circle cx="11.699" cy="80" r="4.5" fill="#FFFFFF" />
    <circle cx="11.699" cy="30" r="4.5" fill="#FFFFFF" />
  </g>

  <!-- Logo Typography -->
  <g class="logo-wordmark" transform="translate(150, 94)" style="user-select: none;">
    <text font-family="'Outfit', 'Inter', 'Roboto', 'Segoe UI', sans-serif" font-size="54" font-weight="800" fill="#FFFFFF" stroke="#0B1220" stroke-width="3.2" stroke-linejoin="round" paint-order="stroke fill" letter-spacing="-1">
      Nightly<tspan fill="url(#text-gradient)" font-weight="300">Dev</tspan>
    </text>
  </g>
</svg>
