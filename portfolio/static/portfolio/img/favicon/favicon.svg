<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="100%" height="100%">
  <defs>
    <!-- Modern Tech Gradients -->
    <linearGradient id="ai-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#0077FF" />
      <stop offset="100%" stop-color="#B400FF" />
    </linearGradient>

    <!-- Glassmorphism Effects -->
    <linearGradient id="glass-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <linearGradient id="glass-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <g>
    <!-- Outer Glass Hexagon (Base Panel) -->
    <polygon points="55,5 98.301,30 98.301,80 55,105 11.699,80 11.699,30" fill="url(#glass-fill)" stroke="url(#glass-stroke)" stroke-width="1.5" />
    
    <!-- Inner Neural Network (Hypercube structure) -->
    <polygon points="55,30 76.651,42.5 76.651,67.5 55,80 33.349,67.5 33.349,42.5" fill="none" stroke="url(#ai-gradient)" stroke-width="1.5" />
    
    <!-- Inner radiating connections -->
    <line x1="55" y1="30" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="76.651" y1="42.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="76.651" y1="67.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="55" y1="80" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="33.349" y1="67.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="33.349" y1="42.5" x2="55" y2="55" stroke="url(#ai-gradient)" stroke-width="1.5" />

    <!-- Outer radiating connections -->
    <line x1="55" y1="5" x2="55" y2="30" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="98.301" y1="30" x2="76.651" y2="42.5" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="98.301" y1="80" x2="76.651" y2="67.5" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="55" y1="105" x2="55" y2="80" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="11.699" y1="80" x2="33.349" y2="67.5" stroke="url(#ai-gradient)" stroke-width="1.5" />
    <line x1="11.699" y1="30" x2="33.349" y2="42.5" stroke="url(#ai-gradient)" stroke-width="1.5" />

    <!-- Stylized 'N' Highlight Path -->
    <path d="M 11.699 80 L 11.699 30 L 55 55 L 98.301 80 L 98.301 30" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Center Core Node -->
    <circle cx="55" cy="55" r="5.5" fill="#FFFFFF" />
    
    <!-- Inner Nodes -->
    <circle cx="55" cy="30" r="4" fill="#00E5FF" />
    <circle cx="76.651" cy="42.5" r="4" fill="#0077FF" />
    <circle cx="76.651" cy="67.5" r="4" fill="#B400FF" />
    <circle cx="55" cy="80" r="4" fill="#B400FF" />
    <circle cx="33.349" cy="67.5" r="4" fill="#0077FF" />
    <circle cx="33.349" cy="42.5" r="4" fill="#00E5FF" />
    
    <!-- Outer Nodes / Path Vertices -->
    <circle cx="55" cy="5" r="3.5" fill="#00E5FF" />
    <circle cx="98.301" cy="30" r="5" fill="#FFFFFF" />
    <circle cx="98.301" cy="80" r="5" fill="#FFFFFF" />
    <circle cx="55" cy="105" r="3.5" fill="#B400FF" />
    <circle cx="11.699" cy="80" r="5" fill="#FFFFFF" />
    <circle cx="11.699" cy="30" r="5" fill="#FFFFFF" />
  </g>
</svg>
